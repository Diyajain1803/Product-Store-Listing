<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Store</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ══ HEADER ══════════════════════════════════════════════════════════ -->
  <header>
    <div class="header-inner">
      <span class="logo">🛒 Product Store</span>
      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="products" role="tab" aria-selected="true">
          📦 Products
        </button>
        <button class="tab" data-tab="add" role="tab" aria-selected="false">
          ➕ Add Product
        </button>
      </nav>
    </div>
  </header>

  <!-- ══ PRODUCTS TAB ═════════════════════════════════════════════════════ -->
  <main id="tab-products" class="tab-panel active">
    <div class="layout">

      <!-- Sidebar filters -->
      <aside class="sidebar">
        <h2>Filters</h2>

        <div class="filter-group">
          <label class="filter-title">Category</label>
          <div id="category-filters" class="checkbox-list">
            <span class="loading-text">Loading…</span>
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-title">Price Range</label>
          <div class="price-inputs">
            <div class="price-field">
              <label for="min-price">Min (₹)</label>
              <input type="number" id="min-price" placeholder="0" min="0" />
            </div>
            <div class="price-field">
              <label for="max-price">Max (₹)</label>
              <input type="number" id="max-price" placeholder="Any" min="0" />
            </div>
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-title" for="sort-select">Sort by Price</label>
          <select id="sort-select">
            <option value="">-- Default --</option>
            <option value="price_asc">Low → High</option>
            <option value="price_desc">High → Low</option>
          </select>
        </div>

        <button id="reset-btn" class="btn btn-secondary">Reset Filters</button>
      </aside>

      <!-- Product grid -->
      <section class="products-area">
        <div class="results-header">
          <span id="results-count" class="results-count">Loading products…</span>
        </div>
        <div id="product-grid" class="product-grid">
          <!-- cards injected here -->
        </div>
        <div id="no-results" class="no-results hidden">
          <span>😕</span>
          <p>No products match your filters.</p>
        </div>
      </section>

    </div>
  </main>

  <!-- ══ ADD PRODUCT TAB ══════════════════════════════════════════════════ -->
  <main id="tab-add" class="tab-panel">
    <div class="form-container">
      <h2>Add a New Product</h2>
      <p class="form-subtitle">Fill in the details below to add a product to the store.</p>

      <form id="add-product-form" novalidate>

        <div class="form-group">
          <label for="p-name">Product Name <span class="req">*</span></label>
          <input type="text" id="p-name" placeholder="e.g. Bluetooth Speaker" maxlength="80" required />
          <span class="error-msg" id="err-name"></span>
        </div>

        <div class="form-group">
          <label for="p-price">Price (₹) <span class="req">*</span></label>
          <input type="number" id="p-price" placeholder="e.g. 999" min="0" step="0.01" required />
          <span class="error-msg" id="err-price"></span>
        </div>

        <div class="form-group">
          <label for="p-category">Category <span class="req">*</span></label>
          <div class="category-input-row">
            <select id="p-category-select">
              <option value="">-- Select existing --</option>
            </select>
            <span class="or-divider">or</span>
            <input type="text" id="p-category-new" placeholder="Type new category" maxlength="40" />
          </div>
          <span class="error-msg" id="err-cat"></span>
        </div>

        <div class="form-group">
          <label for="p-image">Product Image <span class="opt">(optional)</span></label>
          <div class="image-upload-area" id="image-upload-area">
            <input type="file" id="p-image" accept="image/*" />
            <div class="upload-placeholder" id="upload-placeholder">
              <span class="upload-icon">📷</span>
              <span>Click to choose an image</span>
              <span class="upload-hint">JPG, PNG, WEBP — max 5 MB</span>
            </div>
            <img id="image-preview" class="image-preview hidden" alt="Preview" />
            <button type="button" id="remove-image-btn" class="remove-img-btn hidden">✕ Remove</button>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Add Product</button>
          <button type="button" id="clear-form-btn" class="btn btn-secondary">Clear</button>
        </div>

        <div id="submit-msg" class="submit-msg hidden"></div>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
</body>

</html>
